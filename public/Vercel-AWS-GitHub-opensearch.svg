<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Connection lines -->
  <line x1="320" y1="315" x2="500" y2="315" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="700" y1="315" x2="880" y2="315" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6 4"/>
  
  <!-- Vercel Logo (Triangle) -->
  <g transform="translate(180, 270)">
    <polygon points="60,0 120,90 0,90" fill="white"/>
    <text x="60" y="120" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">Vercel</text>
  </g>
  
  <!-- AWS OpenSearch Logo (stylized) -->
  <g transform="translate(520, 255)">
    <!-- OpenSearch magnifying glass icon -->
    <circle cx="70" cy="55" r="35" stroke="#005EB8" stroke-width="6" fill="none"/>
    <line x1="95" y1="80" x2="115" y2="100" stroke="#005EB8" stroke-width="6" stroke-linecap="round"/>
    <!-- Inner circle detail -->
    <circle cx="70" cy="55" r="18" stroke="#FF9900" stroke-width="3" fill="none"/>
    <text x="75" y="140" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">Amazon OpenSearch</text>
    <text x="75" y="162" text-anchor="middle" fill="#999999" font-family="system-ui, -apple-system, sans-serif" font-size="14">Serverless</text>
  </g>
  
  <!-- GitHub Logo (Octocat simplified) -->
  <g transform="translate(880, 270)">
    <circle cx="60" cy="45" r="40" fill="white"/>
    <circle cx="45" cy="38" r="5" fill="#000"/>
    <circle cx="75" cy="38" r="5" fill="#000"/>
    <path d="M 42 58 Q 60 70 78 58" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="60" y="120" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">GitHub</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">Next.js + Amazon OpenSearch Serverless</text>
  <text x="600" y="520" text-anchor="middle" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="16">Full-text search with faceted filtering, highlighting, and autocomplete</text>
  
  <!-- Badge pills -->
  <rect x="420" y="550" rx="12" ry="12" width="100" height="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="470" y="566" text-anchor="middle" fill="#ccc" font-family="system-ui, -apple-system, sans-serif" font-size="11">SigV4 Auth</text>
  
  <rect x="540" y="550" rx="12" ry="12" width="120" height="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="600" y="566" text-anchor="middle" fill="#ccc" font-family="system-ui, -apple-system, sans-serif" font-size="11">107 Recipes</text>
  
  <rect x="680" y="550" rx="12" ry="12" width="100" height="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="730" y="566" text-anchor="middle" fill="#ccc" font-family="system-ui, -apple-system, sans-serif" font-size="11">18 Cuisines</text>
</svg>
